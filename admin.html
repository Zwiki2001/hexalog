<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HexaLog — Admin TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#070C18;color:#E4EAFF;min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0B1220}::-webkit-scrollbar-thumb{background:#1A3F8F;border-radius:3px}
a{text-decoration:none;color:inherit}
input,textarea,button,select{font-family:inherit}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(26,63,143,.25) 0%,transparent 65%),#070C18}
.login-box{background:#121A2E;border:1px solid rgba(26,63,143,.4);border-radius:20px;padding:48px 44px;max-width:420px;width:100%;text-align:center}
.login-box h1{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;margin:16px 0 6px}
.login-box p{color:#8094B8;font-size:.88rem;margin-bottom:28px}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#4A9EFF,#2E6ADB,#F5A623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#F5A623;box-shadow:0 0 8px #F5A623;margin-left:2px;vertical-align:middle;position:relative;top:-3px}
.ff{position:relative;margin-bottom:12px}
.ff input{width:100%;background:#0B1220;border:1px solid rgba(255,255,255,.08);color:#E4EAFF;font-size:.9rem;padding:15px 13px 7px;border-radius:8px;outline:none;transition:border-color .2s}
.ff input:focus{border-color:#F5A623;box-shadow:0 0 0 3px rgba(245,166,35,.1)}
.ff label{position:absolute;left:13px;top:13px;font-size:.85rem;color:#3D5080;pointer-events:none;transition:all .2s}
.ff input:focus~label,.ff input:not(:placeholder-shown)~label{top:5px;font-size:.68rem;color:#FFB940;letter-spacing:.04em}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#1A3F8F,#2E6ADB);border:none;color:#fff;font-weight:700;font-size:.95rem;border-radius:10px;cursor:pointer;transition:all .3s;margin-top:4px}
.btn-login:hover{box-shadow:0 6px 24px rgba(26,63,143,.5)}
.login-err{display:none;color:#FF6B6B;font-size:.8rem;margin-top:8px}
.admin-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);color:#FFB940;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:99px;margin-bottom:18px}

/* DASHBOARD */
.dashboard{display:none}
/* Top nav */
.top-nav{background:rgba(7,12,24,.97);border-bottom:1px solid rgba(26,63,143,.3);padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.nav-left{display:flex;align-items:center;gap:14px}
.admin-tag{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#FF6B6B;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);padding:3px 10px;border-radius:99px}
.nav-actions{display:flex;align-items:center;gap:10px}
.btn-sm{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#8094B8;font-size:.78rem;padding:7px 14px;border-radius:7px;cursor:pointer;transition:all .2s}
.btn-sm:hover{border-color:rgba(255,255,255,.2);color:#E4EAFF}
.btn-sm.danger:hover{border-color:rgba(255,107,107,.4);color:#FF6B6B}

/* Layout */
.body-wrap{max-width:1300px;margin:0 auto;padding:28px 24px 80px;display:flex;gap:24px;align-items:flex-start}
.sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;position:sticky;top:90px}
.main-panel{flex:1;min-width:0;display:flex;flex-direction:column;gap:20px}
@media(max-width:900px){.body-wrap{flex-direction:column}.sidebar{width:100%;position:static}}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:700px){.stats-row{grid-template-columns:1fr 1fr}}
.stat-card{background:#121A2E;border:1px solid rgba(26,63,143,.3);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#2E6ADB,#F5A623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.stat-lbl{font-size:.7rem;color:#8094B8;margin-top:4px;text-transform:uppercase;letter-spacing:.04em}

/* Filter sidebar */
.filter-card{background:#121A2E;border:1px solid rgba(26,63,143,.3);border-radius:12px;padding:18px}
.filter-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8094B8;margin-bottom:12px}
.filter-btns{display:flex;flex-direction:column;gap:4px}
.fb{background:transparent;border:none;color:#8094B8;font-size:.83rem;padding:8px 10px;border-radius:7px;cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:center;justify-content:space-between}
.fb:hover{background:rgba(255,255,255,.04);color:#E4EAFF}
.fb.active{background:rgba(26,63,143,.18);color:#E4EAFF}
.fb-count{font-size:.7rem;background:rgba(255,255,255,.07);padding:2px 7px;border-radius:99px}

/* Search */
.search-row{display:flex;gap:10px;align-items:center}
.search-input{flex:1;background:#121A2E;border:1px solid rgba(26,63,143,.3);color:#E4EAFF;font-size:.88rem;padding:11px 14px;border-radius:9px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:#F5A623}

/* Order list */
.orders-list{display:flex;flex-direction:column;gap:10px}
.order-row{background:#121A2E;border:1px solid rgba(26,63,143,.25);border-radius:12px;padding:16px 20px;cursor:pointer;transition:all .25s;display:grid;grid-template-columns:auto 1fr auto auto;gap:16px;align-items:center}
.order-row:hover{border-color:rgba(245,166,35,.35);background:#172035}
.order-row.active{border-color:#F5A623;background:#172035}
.or-id{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;color:#FFB940;white-space:nowrap}
.or-info{min-width:0}
.or-name{font-size:.88rem;font-weight:600;color:#E4EAFF;margin-bottom:2px}
.or-route{font-size:.75rem;color:#8094B8}
.or-price{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:#E4EAFF;white-space:nowrap}
.or-date{font-size:.72rem;color:#3D5080;white-space:nowrap}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.s-pending{background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);color:#FFB940}
.s-confirmed{background:rgba(26,63,143,.18);border:1px solid rgba(46,106,219,.35);color:#7EB3FF}
.s-picked_up{background:rgba(100,180,255,.1);border:1px solid rgba(100,180,255,.3);color:#64B4FF}
.s-in_transit{background:rgba(130,100,255,.1);border:1px solid rgba(130,100,255,.3);color:#A080FF}
.s-out_for_delivery{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.4);color:#FFB940}
.s-delivered{background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.25);color:#00D4AA}
.s-damaged{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);color:#FF6B6B}
.s-waiting_customer{background:rgba(255,200,50,.1);border:1px solid rgba(255,200,50,.3);color:#FFC832}
.s-cancelled{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#8094B8}
.sdot{width:6px;height:6px;border-radius:50%;background:currentColor}
.or-paid{font-size:.68rem;font-weight:700;color:#00D4AA;background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);padding:2px 7px;border-radius:99px;white-space:nowrap}
@media(max-width:640px){.order-row{grid-template-columns:1fr 1fr;gap:8px}}

/* Detail panel */
.detail-panel{background:#121A2E;border:1px solid rgba(26,63,143,.3);border-radius:16px;overflow:hidden;display:none}
.dp-head{padding:20px 24px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.dp-id{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:800;color:#FFB940}
.dp-body{padding:24px;display:flex;flex-direction:column;gap:20px}
.dp-section{background:#0B1220;border-radius:10px;padding:16px}
.dp-sec-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#3D5080;margin-bottom:12px}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:560px){.kv-grid{grid-template-columns:1fr}}
.kv{display:flex;flex-direction:column;gap:2px}
.kv-l{font-size:.68rem;color:#3D5080;text-transform:uppercase;letter-spacing:.05em}
.kv-v{font-size:.88rem;font-weight:600;color:#E4EAFF}
.kv-v.hl{color:#FFB940}

/* Status updater */
.status-updater{background:#0B1220;border-radius:10px;padding:18px;border:1px solid rgba(245,166,35,.1)}
.su-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#FFB940;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.status-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:500px){.status-btns{grid-template-columns:1fr 1fr}}
.stt-btn{background:#121A2E;border:1px solid rgba(255,255,255,.07);color:#8094B8;font-size:.75rem;font-weight:600;padding:9px 6px;border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;line-height:1.3}
.stt-btn:hover{border-color:rgba(245,166,35,.4);color:#E4EAFF;background:rgba(26,63,143,.1)}
.stt-btn.active{border-color:#F5A623;background:rgba(26,63,143,.2);color:#FFB940}
.note-row{display:flex;gap:10px;margin-top:12px;align-items:flex-start}
.note-row textarea{flex:1;background:#121A2E;border:1px solid rgba(255,255,255,.08);color:#E4EAFF;font-size:.83rem;padding:10px 12px;border-radius:8px;outline:none;resize:vertical;min-height:60px}
.note-row textarea:focus{border-color:#F5A623}
.btn-update{background:linear-gradient(135deg,#1A3F8F,#2E6ADB);border:none;color:#fff;font-weight:700;font-size:.83rem;padding:10px 18px;border-radius:8px;cursor:pointer;transition:all .3s;white-space:nowrap}
.btn-update:hover{box-shadow:0 4px 14px rgba(26,63,143,.5)}

/* POD Upload */
.pod-upload{background:#0B1220;border-radius:10px;padding:16px;border:2px dashed rgba(26,63,143,.3);transition:border-color .2s}
.pod-upload:hover{border-color:rgba(245,166,35,.4)}
.pod-upload.has-pod{border-color:rgba(0,212,170,.3);border-style:solid}
.pod-upload label{display:flex;align-items:center;gap:12px;cursor:pointer}
.pod-upload input[type=file]{display:none}
.pod-ico{width:40px;height:40px;background:rgba(26,63,143,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pod-ico svg{width:20px;height:20px;color:#7EB3FF}
.pod-txt strong{display:block;font-size:.85rem;font-weight:700;color:#E4EAFF;margin-bottom:2px}
.pod-txt small{font-size:.73rem;color:#8094B8}
.pod-uploaded{display:flex;align-items:center;gap:10px;color:#00D4AA;font-size:.85rem;font-weight:600}

/* Timeline */
.tl-mini{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto}
.tl-evt{display:flex;align-items:flex-start;gap:10px;font-size:.8rem;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.tl-evt:last-child{border-bottom:none}
.tl-status{font-weight:700;color:#FFB940;white-space:nowrap;min-width:120px}
.tl-ts{color:#3D5080;font-size:.72rem;white-space:nowrap}
.tl-note-t{color:#8094B8;font-size:.76rem;font-style:italic}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:#3D5080}
.empty svg{opacity:.25;margin-bottom:14px}

/* NEW ORDER BUTTON */
.btn-new{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#1A3F8F,#2E6ADB);border:none;color:#fff;font-weight:700;font-size:.83rem;padding:9px 18px;border-radius:8px;cursor:pointer;transition:all .3s}
.btn-new:hover{box-shadow:0 4px 14px rgba(26,63,143,.5)}

/* Accept / Reject bar */
.accept-bar{background:linear-gradient(135deg,rgba(26,63,143,.18),rgba(245,166,35,.06));border:1px solid rgba(245,166,35,.35);border-radius:12px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.accept-bar-info strong{display:block;font-size:.95rem;font-weight:700;color:#E4EAFF;margin-bottom:3px}
.accept-bar-info span{font-size:.8rem;color:#8094B8}
.accept-bar-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-accept{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#00a882,#00D4AA);border:none;color:#fff;font-weight:800;font-size:.9rem;padding:11px 24px;border-radius:9px;cursor:pointer;transition:all .3s;box-shadow:0 4px 18px rgba(0,212,170,.25)}
.btn-accept:hover{box-shadow:0 6px 24px rgba(0,212,170,.45);transform:translateY(-1px)}
.btn-reject{display:inline-flex;align-items:center;gap:8px;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);color:#FF6B6B;font-weight:700;font-size:.88rem;padding:11px 20px;border-radius:9px;cursor:pointer;transition:all .3s}
.btn-reject:hover{background:rgba(255,107,107,.2);border-color:rgba(255,107,107,.5)}
.btn-ask{display:inline-flex;align-items:center;gap:8px;background:rgba(255,200,50,.08);border:1px solid rgba(255,200,50,.3);color:#FFC832;font-weight:700;font-size:.88rem;padding:11px 20px;border-radius:9px;cursor:pointer;transition:all .3s}
.btn-ask:hover{background:rgba(255,200,50,.15)}
.new-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.4);color:#FFB940;font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:99px;animation:newPulse 2s ease-in-out infinite}
@keyframes newPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,166,35,.4)}50%{box-shadow:0 0 0 6px rgba(245,166,35,0)}}

/* Email preview modal */
.email-preview{background:#0B1220;border:1px solid rgba(26,63,143,.3);border-radius:10px;padding:16px;font-size:.82rem;line-height:1.7;color:#8094B8;white-space:pre-wrap;max-height:220px;overflow-y:auto;text-align:left;margin:12px 0}
.email-preview strong{color:#E4EAFF}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:#121A2E;border:1px solid rgba(26,63,143,.4);border-radius:16px;padding:32px;max-width:500px;width:100%;transform:scale(.92);transition:transform .3s;position:relative;max-height:90vh;overflow-y:auto}
.modal-bg.open .modal{transform:scale(1)}
.modal-x{position:absolute;top:12px;right:12px;width:28px;height:28px;background:rgba(255,255,255,.06);border:none;color:#8094B8;font-size:1.1rem;border-radius:6px;cursor:pointer}
.modal h3{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .span2{grid-column:1/-1}
/* ── YETI LOGIN FORM ── */
#yetiForm{width:100%;margin-top:16px}
.svgContainer{position:relative;width:170px;height:170px;margin:0 auto 20px;border-radius:50%;pointer-events:none}
.svgContainer div{position:relative;width:100%;height:0;overflow:hidden;border-radius:50%;padding-bottom:100%}
.svgContainer .mySVG{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none}
.svgContainer:after{content:"";position:absolute;top:0;left:0;z-index:10;width:inherit;height:inherit;box-sizing:border-box;border:solid 3px #1A3F8F;border-radius:50%;box-shadow:0 0 20px rgba(26,63,143,.4)}
.yeti-input-group{margin:0 0 18px;padding:0;position:relative}
.yeti-input-group label:first-child{display:block;font-size:.78rem;font-weight:700;color:#3A6FCC;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.yeti-input-group input[type=email],.yeti-input-group input[type=password],.yeti-input-group input[type=text]{display:block;width:100%;padding:12px 14px;background:#0B1220;border:1.5px solid rgba(255,255,255,.1);border-radius:8px;color:#E4EAFF;font-size:1rem;font-weight:600;outline:none;box-sizing:border-box;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.yeti-input-group input:focus{border-color:#F5A623;box-shadow:0 0 0 3px rgba(245,166,35,.12)}
.yeti-ig1{position:relative}
.yeti-helper{position:absolute;top:34px;left:14px;font-size:1rem;color:#3A6FCC;opacity:.5;pointer-events:none;transition:transform .2s ease-out,opacity .2s}
.yeti-ig1.focusWithText .yeti-helper{transform:translateY(-10px) scale(.62);opacity:.8;transform-origin:0 0}
#showPasswordToggle{display:block;padding:0 0 0 1.3em;position:absolute;top:6px;right:0;font-size:.82rem;color:#3A6FCC;cursor:pointer}
#showPasswordToggle input{position:absolute;z-index:-1;opacity:0}
.yeti-indicator{position:absolute;top:0;left:0;height:.85em;width:.85em;background:#0B1220;border:solid 2px #1A3F8F;border-radius:3px}
.yeti-indicator:after{content:"";position:absolute;left:.22em;top:.02em;width:.18em;height:.45em;border:solid #F5A623;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);visibility:hidden}
#showPasswordCheck:checked~.yeti-indicator:after{visibility:visible}
.yeti-submit{width:100%;padding:13px;background:linear-gradient(135deg,#1A3F8F,#2E6ADB);border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px;font-family:inherit}
.yeti-submit:hover{opacity:.9}

.modal select{width:100%;background:#0B1220;border:1px solid rgba(255,255,255,.08);color:#E4EAFF;font-size:.88rem;padding:11px 12px;border-radius:8px;outline:none;box-sizing:border-box}
.modal select:focus{border-color:#F5A623}
.modal select:disabled{opacity:.4;cursor:not-allowed}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.btn-cancel-m{flex:1;background:transparent;border:1px solid rgba(255,255,255,.1);color:#8094B8;padding:11px;border-radius:8px;cursor:pointer}
.btn-save-m{flex:2;background:linear-gradient(135deg,#1A3F8F,#2E6ADB);border:none;color:#fff;font-weight:700;padding:11px;border-radius:8px;cursor:pointer}
.no-section-label{font-size:.7rem;font-weight:700;color:#3A6FCC;letter-spacing:.08em;text-transform:uppercase;padding:10px 0 8px;border-top:1px solid rgba(26,63,143,.2);margin-bottom:10px}
.no-lbl{font-size:.7rem;color:#3D5080;text-transform:uppercase;letter-spacing:.05em}
.no-chk{display:flex;align-items:center;gap:7px;font-size:.82rem;color:#8094B8;cursor:pointer;padding:7px 12px;background:#0B1220;border:1px solid rgba(255,255,255,.07);border-radius:8px}
.no-chk input{accent-color:#F5A623;width:14px;height:14px}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <span class="logo-text">HexaLog</span><span class="logo-dot"></span>
    <div class="admin-badge">&#9881; Admin TMS</div>

    <form id="yetiForm" autocomplete="off" onsubmit="return false;">
      <div class="svgContainer">
        <div>
          <svg class="mySVG" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 200 200">
            <defs><circle id="armMaskPath" cx="100" cy="100" r="100"/></defs>
            <clipPath id="armMask"><use xlink:href="#armMaskPath" overflow="visible"/></clipPath>
            <circle cx="100" cy="100" r="100" fill="#1A3F8F"/>

<!-- New Order Modal -->
<div class="modal-bg" id="newOrderModal">
  <div class="modal" style="max-width:680px">
    <button class="modal-x" id="newOrderX">&times;</button>
    <h3 style="margin-bottom:20px">&#43; Create New Order</h3>

    <!-- CLIENT INFO -->
    <div class="no-section-label">Client Information</div>
    <div class="form-grid" style="margin-bottom:16px">
      <div class="ff span2"><input type="text" id="no_name" placeholder=" " required/><label>Full Name *</label></div>
      <div class="ff"><input type="email" id="no_email" placeholder=" " required/><label>Email *</label></div>
      <div class="ff"><input type="tel" id="no_phone" placeholder=" "/><label>Phone</label></div>
      <div class="ff"><input type="text" id="no_company" placeholder=" "/><label>Company</label></div>
      <div class="ff">
        <select id="no_otype" style="width:100%;background:#0B1220;border:1px solid rgba(255,255,255,.08);color:#E4EAFF;font-size:.88rem;padding:11px 12px;border-radius:8px;outline:none">
          <option value="B2B">B2B — Business</option>
          <option value="B2C">B2C — Consumer</option>
        </select>
        <label style="font-size:.7rem;color:#3D5080;text-transform:uppercase;letter-spacing:.05em;margin-top:4px">Order Type</label>
      </div>
    </div>

    <!-- PICKUP -->
    <div class="no-section-label" style="border-top-color:#1A3F8F">&#8599; Pickup Details</div>

        <label class="no-lbl">City *</label>
        <select id="no_toCity" disabled>
          <option value="">-- Select country first --</option>
        </select>
      </div>
      <div class="ff span2"><input type="text" id="no_deliveryAddr" placeholder=" "/><label>Street &amp; Number</label></div>
      <div class="ff"><input type="text" id="no_deliveryContact" placeholder=" "/><label>Contact Name</label></div>
      <div class="ff"><input type="tel" id="no_deliveryPhone" placeholder=" "/><label>Contact Phone</label></div>

    <!-- SHIPMENT -->
    <div class="no-section-label">Shipment Details</div>

      <div style="display:flex;flex-direction:column;gap:4px">
        <label class="no-lbl">Service</label>
        <select id="no_svc">
          <option value="LTL">LTL — Pallet (shared)</option>
          <option value="FTL">FTL — Full Truck</option>
          <option value="EXPRESS">Express 24h</option>
          <option value="WEEKEND">Weekend Delivery</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <label class="no-lbl">Pallet Type</label>
        <select id="no_palType">
          <option value="Euro Pallet">Euro Pallet (120×80)</option>
          <option value="Block Pallet">Block Pallet (120×100)</option>
          <option value="Half Pallet">Half Pallet (80×60)</option>
          <option value="Industry Pallet">Industry Pallet (120×120)</option>
          <option value="Custom">Custom size</option>
        </select>
      </div>
      <div class="ff"><input type="number" id="no_qty" placeholder=" " value="1" min="1"/><label>Quantity (pallets)</label></div>
      <div class="ff"><input type="number" id="no_weight" placeholder=" "/><label>Weight per pallet (kg)</label></div>
      <div class="ff"><input type="number" id="no_height" placeholder=" "/><label>Height (cm)</label></div>
      <div class="ff"><input type="text" id="no_price" placeholder=" "/><label>Agreed Price (e.g. €85.00)</label></div>
    </div>

    <!-- EXTRAS & NOTES -->
    <div class="no-section-label">Extras &amp; Notes</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px">
      <label class="no-chk"><input type="checkbox" id="no_tailLift"/> Tail lift</label>
      <label class="no-chk"><input type="checkbox" id="no_insurance"/> Cargo insurance</label>
      <label class="no-chk"><input type="checkbox" id="no_notify"/> SMS updates</label>
      <label class="no-chk"><input type="checkbox" id="no_paid"/> Mark as paid</label>
    </div>
    <div class="form-grid">
      <div class="ff span2"><textarea id="no_notes" placeholder="Internal notes, special instructions..." style="background:#0B1220;border:1px solid rgba(255,255,255,.08);color:#E4EAFF;font-size:.88rem;padding:11px 12px;border-radius:8px;outline:none;width:100%;box-sizing:border-box;resize:vertical;min-height:70px;font-family:inherit"></textarea></div>
    </div>

    <p id="noErr" style="color:#FF6B6B;font-size:.8rem;margin-top:10px;display:none"></p>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-cancel-m" id="newOrderCancel">Cancel</button>
      <button class="btn-save-m" id="newOrderSave">&#43; Create Order</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
var ADMIN_PW = 'hexalog2025';
var CNAME = {BE:'Belgium',NL:'Netherlands',LU:'Luxembourg',FR:'France'};
var ALL_STATUSES = ['pending','confirmed','picked_up','in_transit','out_for_delivery','delivered','damaged','waiting_customer','cancelled'];
var STATUS_MAP = {
  pending:          {label:'Pending',               cls:'s-pending'},
  confirmed:        {label:'Confirmed',             cls:'s-confirmed'},
  picked_up:        {label:'Picked Up',             cls:'s-picked_up'},
  in_transit:       {label:'In Transit',            cls:'s-in_transit'},
  out_for_delivery: {label:'Out for Delivery',      cls:'s-out_for_delivery'},
  delivered:        {label:'Delivered',             cls:'s-delivered'},
  damaged:          {label:'Damaged',               cls:'s-damaged'},
  waiting_customer: {label:'Waiting Customer',      cls:'s-waiting_customer'},
  cancelled:        {label:'Cancelled',             cls:'s-cancelled'}
};
var currentFilter = 'all';
var currentOrderId = null;

// ── SUPABASE ──────────────────────────────────────────────────
var _sb = supabase.createClient('https://mjcuhyujqpzgybbqeaxd.supabase.co','sb_publishable_1DZMiEy3eonWMiWKy7B_dA_t0IhBff0');
var _orders = [];

function dbToOrder(r){
  return {id:r.id,status:r.status,createdAt:r.created_at,orderType:r.order_type,
    client:r.client||{},shipment:r.shipment||{},price:r.price,paid:r.paid,pod:r.pod,timeline:r.timeline||[]};
}
function orderToDb(o){
  return {id:o.id,status:o.status,created_at:o.createdAt,order_type:o.orderType||'B2B',
    client:o.client,shipment:o.shipment,price:o.price,paid:o.paid||false,pod:o.pod||null,timeline:o.timeline||[]};
}
async function fetchOrders(){
  var {data,error}=await _sb.from('orders').select('*').order('created_at',{ascending:false});
  if(!error) _orders=data.map(dbToOrder);
  return _orders;
}
async function upsertOrder(o){
  _orders=_orders.filter(function(x){return x.id!==o.id;});
  _orders.unshift(o);
  await _sb.from('orders').upsert(orderToDb(o));
}
function getOrders(){ return _orders; }
function saveOrders(arr){ _orders=arr; }

function fmtDate(ts){
  if(!ts) return '—';
  var d=new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// ── LOGIN ─────────────────────────────────────────────────────
document.getElementById('btnAdminLogin').addEventListener('click', doLogin);
document.getElementById('loginPassword').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
async function doLogin(){
  var pw=document.getElementById('loginPassword').value;
  if(pw===ADMIN_PW){
    sessionStorage.setItem('hl_admin','1');
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('dashboard').style.display='block';
    await fetchOrders();
    loadDashboard();
    subscribeRealtime();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}
document.getElementById('btnAdminLogout').addEventListener('click',function(){
  sessionStorage.removeItem('hl_admin');
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('pwInput').value='';
});

// Auto-login
if(sessionStorage.getItem('hl_admin')==='1'){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('dashboard').style.display='block';
  fetchOrders().then(function(){
    loadDashboard();
    subscribeRealtime();
  });
}

// ── DASHBOARD ────────────────────────────────────────────────
function loadDashboard(){
  renderStats();
  renderFilters();
  renderOrders();
}

function renderStats(){
  var orders=getOrders();
  document.getElementById('sTotal').textContent=orders.length;
  var active=orders.filter(function(o){return !['delivered','cancelled'].includes(o.status)}).length;
  document.getElementById('sActive').textContent=active;
  var delivered=orders.filter(function(o){return o.status==='delivered'}).length;
  document.getElementById('sDelivered').textContent=delivered;
  var rev=0;
  orders.filter(function(o){return o.paid}).forEach(function(o){
    var p=parseFloat((o.price||'').replace(/[^0-9.]/g,''));
    if(!isNaN(p))rev+=p;
  });
  document.getElementById('sRevenue').textContent='€'+rev.toFixed(0);
}

function renderFilters(){
  var orders=getOrders();
  var counts={all:orders.length};
  ALL_STATUSES.forEach(function(s){ counts[s]=orders.filter(function(o){return o.status===s}).length; });
  var html='<button class="fb '+(currentFilter==='all'?'active':'')+'" data-f="all">All orders <span class="fb-count">'+counts.all+'</span></button>';
  ALL_STATUSES.forEach(function(s){
    if(counts[s]>0||s==='pending'||s==='confirmed'){
      html+='<button class="fb '+(currentFilter===s?'active':'')+'" data-f="'+s+'">'+(STATUS_MAP[s]||{label:s}).label+' <span class="fb-count">'+counts[s]+'</span></button>';
    }
  });
  var fb=document.getElementById('filterBtns');
  fb.innerHTML=html;
  fb.querySelectorAll('.fb').forEach(function(btn){
    btn.addEventListener('click',function(){
      currentFilter=btn.dataset.f;
      renderFilters();
      renderOrders();
    });
  });
}

function renderOrders(){
  var orders=getOrders();
  var q=document.getElementById('searchInput').value.toLowerCase();
  var filtered=orders.filter(function(o){
    if(currentFilter!=='all'&&o.status!==currentFilter) return false;
    if(q){
      var hay=(o.id+' '+o.client.name+' '+o.client.email+' '+(CNAME[o.shipment.from]||'')+' '+(CNAME[o.shipment.to]||'')+(o.client.company||'')).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  var html='';
  if(!filtered.length){
    html='<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 13h4"/></svg><p>No orders found</p></div>';
  } else {
    filtered.forEach(function(o){
      var sm=STATUS_MAP[o.status]||{label:o.status,cls:'s-pending'};
      var isActive=currentOrderId===o.id;
      html+='<div class="order-row'+(isActive?' active':'')+'" data-id="'+o.id+'">';
      html+='<div><div class="or-id">'+o.id+'</div><div style="font-size:.68rem;color:#3D5080">'+fmtDate(o.createdAt)+'</div></div>';
      html+='<div class="or-info"><div class="or-name">'+o.client.name+(o.client.company?' <span style="color:#3D5080;font-weight:400">· '+o.client.company+'</span>':'')+'</div>';
      html+='<div class="or-route">'+(CNAME[o.shipment.from]||o.shipment.from)+' → '+(CNAME[o.shipment.to]||o.shipment.to)+' · '+o.shipment.qty+'× '+o.shipment.palletType+' · '+o.shipment.service+'</div></div>';
      html+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div class="or-price">'+o.price+'</div>'+(o.paid?'<span class="or-paid">✓ Paid</span>':'')+'</div>';
      html+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px"><span class="status-badge '+sm.cls+'"><span class="sdot"></span>'+sm.label+'</span>'+(o.status==='pending'?'<span class="new-badge">New</span>':'')+'</div>';
      html+='</div>';
    });
  }
  document.getElementById('ordersList').innerHTML=html;
  document.querySelectorAll('.order-row').forEach(function(row){
    row.addEventListener('click',function(){
      currentOrderId=row.dataset.id;
      renderOrders();
      var o=getOrders().find(function(x){return x.id===row.dataset.id});
      if(o) renderDetail(o);
    });
  });
}

// ── DETAIL PANEL ─────────────────────────────────────────────
function renderDetail(order){
  var panel=document.getElementById('detailPanel');
  panel.style.display='block';
  var sm=STATUS_MAP[order.status]||{label:order.status,cls:'s-pending'};
  var s=order.shipment;

  // Build status buttons
  var sttHtml='';
  ALL_STATUSES.forEach(function(st){
    sttHtml+='<button class="stt-btn'+(order.status===st?' active':'')+'" data-st="'+st+'">'+(STATUS_MAP[st]||{label:st}).label+'</button>';
  });

  // Timeline
  var tlHtml='';
  (order.timeline||[]).slice().reverse().forEach(function(e){
    var lbl=(STATUS_MAP[e.status]||{label:e.status}).label;
    tlHtml+='<div class="tl-evt"><span class="tl-status">'+lbl+'</span><span class="tl-ts">'+fmtDate(e.ts)+'</span>'+(e.note?'<span class="tl-note-t"> — '+e.note+'</span>':'')+'</div>';
  });

  // POD section
  var podHtml='';
  if(order.status==='delivered'){
    if(order.pod){
      podHtml='<div class="dp-section"><div class="dp-sec-title">Proof of Delivery</div>';
      podHtml+='<div class="pod-upload has-pod"><label><div class="pod-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>';
      podHtml+='<div class="pod-txt"><div class="pod-uploaded">✓ POD uploaded — client can download</div><small>Click to replace</small></div></label>';
      podHtml+='<input type="file" id="podFile" accept=".pdf,.jpg,.jpeg,.png"/></div>';
      podHtml+='</div>';
    } else {
      podHtml='<div class="dp-section" style="border:1px solid rgba(0,212,170,.15)"><div class="dp-sec-title" style="color:#00D4AA">Upload Proof of Delivery</div>';
      podHtml+='<div class="pod-upload"><label><div class="pod-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>';
      podHtml+='<div class="pod-txt"><strong>Upload POD</strong><small>PDF, JPG or PNG — client will be able to download it</small></div></label>';
      podHtml+='<input type="file" id="podFile" accept=".pdf,.jpg,.jpeg,.png"/></div>';
      podHtml+='</div>';
    }
  }

  panel.innerHTML =
    '<div class="dp-head">'+
      '<div style="display:flex;align-items:center;gap:12px">'+
        '<span class="dp-id">'+order.id+'</span>'+
        '<span class="status-badge '+sm.cls+'"><span class="sdot"></span>'+sm.label+'</span>'+
        (order.status==='pending'?'<span class="new-badge">● New Order</span>':'')+
        (order.paid?'<span style="font-size:.73rem;color:#00D4AA;font-weight:700">✓ Paid</span>':'<span style="font-size:.73rem;color:#8094B8">Unpaid</span>')+
      '</div>'+
      '<div style="font-size:.75rem;color:#3D5080">'+fmtDate(order.createdAt)+'</div>'+
    '</div>'+
    // Accept bar — only shown for pending orders
    (order.status==='pending' ?
      '<div style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.05)">'+
        '<div class="accept-bar">'+
          '<div class="accept-bar-info">'+
            '<strong>New booking from '+order.client.name+'</strong>'+
            '<span>'+(CNAME[order.shipment.from]||order.shipment.from)+' → '+(CNAME[order.shipment.to]||order.shipment.to)+
            ' · '+order.shipment.qty+'× '+order.shipment.palletType+' · '+order.price+'</span>'+
          '</div>'+
          '<div class="accept-bar-actions">'+
            '<button class="btn-accept" id="btnAccept">✓ Accept Order</button>'+
            '<button class="btn-ask" id="btnAskInfo">? Ask Info</button>'+
            '<button class="btn-reject" id="btnReject">✕ Reject</button>'+
          '</div>'+
        '</div>'+
      '</div>'
    : '') +
    '<div class="dp-body">'+

      '<div class="dp-section">'+
        '<div class="dp-sec-title">Client</div>'+
        '<div class="kv-grid">'+
          '<div class="kv"><div class="kv-l">Name</div><div class="kv-v">'+order.client.name+'</div></div>'+
          '<div class="kv"><div class="kv-l">Email</div><div class="kv-v" style="word-break:break-all">'+order.client.email+'</div></div>'+
          (order.client.phone?'<div class="kv"><div class="kv-l">Phone</div><div class="kv-v">'+order.client.phone+'</div></div>':'')+
          (order.client.company?'<div class="kv"><div class="kv-l">Company</div><div class="kv-v">'+order.client.company+'</div></div>':'')+
        '</div>'+
        '<div style="display:flex;gap:8px;margin-top:10px">'+
          '<a href="mailto:'+order.client.email+'?subject=Your HexaLog Order '+order.id+'" class="btn-sm" style="font-size:.75rem">✉ Email Client</a>'+
          (order.client.phone?'<a href="tel:'+order.client.phone+'" class="btn-sm" style="font-size:.75rem">📞 Call</a>':'')+
        '</div>'+
      '</div>'+

      '<div class="dp-section">'+
        '<div class="dp-sec-title">Shipment Details</div>'+
        '<div class="kv-grid">'+
          '<div class="kv"><div class="kv-l">From</div><div class="kv-v">'+(CNAME[s.from]||s.from)+(s.fromCity?', '+s.fromCity:'')+'</div></div>'+
          '<div class="kv"><div class="kv-l">To</div><div class="kv-v">'+(CNAME[s.to]||s.to)+(s.toCity?', '+s.toCity:'')+'</div></div>'+
          (s.pickupAddress?'<div class="kv"><div class="kv-l">Pickup Address</div><div class="kv-v">'+s.pickupAddress+'</div></div>':'')+
          (s.deliveryAddress?'<div class="kv"><div class="kv-l">Delivery Address</div><div class="kv-v">'+s.deliveryAddress+'</div></div>':'')+
          (s.pickupPhone?'<div class="kv"><div class="kv-l">Pickup Contact</div><div class="kv-v">'+s.pickupPhone+'</div></div>':'')+
          (s.deliveryPhone?'<div class="kv"><div class="kv-l">Delivery Contact</div><div class="kv-v">'+s.deliveryPhone+'</div></div>':'')+
          '<div class="kv"><div class="kv-l">Service</div><div class="kv-v">'+s.service+'</div></div>'+
          '<div class="kv"><div class="kv-l">Pallets</div><div class="kv-v">'+s.qty+'× '+s.palletType+'</div></div>'+
          (s.height?'<div class="kv"><div class="kv-l">Height</div><div class="kv-v">'+s.height+' cm</div></div>':'')+
          (s.weight?'<div class="kv"><div class="kv-l">Weight</div><div class="kv-v">'+s.weight+' kg</div></div>':'')+
          '<div class="kv"><div class="kv-l">Price</div><div class="kv-v hl">'+order.price+'</div></div>'+
          '<div class="kv"><div class="kv-l">Payment</div><div class="kv-v" style="color:'+(order.paid?'#00D4AA':'#FF6B6B')+'">'+(order.paid?'✓ Paid ('+(order.paymentMethod||'—')+')':'Unpaid')+'</div></div>'+
        '</div>'+
        (s.notes?'<div style="margin-top:10px;font-size:.82rem;color:#8094B8;background:#070C18;border-radius:6px;padding:8px 10px">📝 '+s.notes+'</div>':'')+
      '</div>'+

      '<div class="status-updater">'+
        '<div class="su-title">⚡ Update Status</div>'+
        '<div class="status-btns" id="sttBtns">'+sttHtml+'</div>'+
        '<div class="note-row">'+
          '<textarea id="sttNote" placeholder="Add a note (optional) — e.g. Picked up at 09:30, driver John"></textarea>'+
          '<button class="btn-update" id="btnUpdateStatus">Update</button>'+
        '</div>'+
        '<p id="updateOk" style="font-size:.78rem;color:#00D4AA;margin-top:8px;display:none">✓ Status updated successfully</p>'+
      '</div>'+

      podHtml+

      '<div class="dp-section">'+
        '<div class="dp-sec-title">Timeline History</div>'+
        '<div class="tl-mini">'+tlHtml+'</div>'+
      '</div>'+

    '</div>';

  // Status button clicks
  var pendingSt = order.status;
  document.querySelectorAll('#sttBtns .stt-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('#sttBtns .stt-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
      pendingSt = btn.dataset.st;
    });
  });

  // Update button
  document.getElementById('btnUpdateStatus').addEventListener('click', async function(){
    var note=document.getElementById('sttNote').value.trim();
    var orders=getOrders();
    var idx=orders.findIndex(function(o){return o.id===order.id});
    if(idx<0) return;
    orders[idx].status=pendingSt;
    orders[idx].timeline=orders[idx].timeline||[];
    orders[idx].timeline.push({status:pendingSt,ts:new Date().toISOString(),note:note});
    await upsertOrder(orders[idx]);
    document.getElementById('updateOk').style.display='block';
    setTimeout(function(){document.getElementById('updateOk').style.display='none';},2500);
    renderStats();
    renderFilters();
    renderOrders();
    renderDetail(orders[idx]);
  });

  // ── ACCEPT / REJECT / ASK buttons ────────────────────────────
  async function updateOrderStatus(newStatus, note, openEmail){
    var orders=getOrders();
    var idx=orders.findIndex(function(o){return o.id===order.id});
    if(idx<0) return;
    orders[idx].status=newStatus;
    orders[idx].timeline=orders[idx].timeline||[];
    orders[idx].timeline.push({status:newStatus,ts:new Date().toISOString(),note:note});
    await upsertOrder(orders[idx]);
    renderStats(); renderFilters(); renderOrders();
    renderDetail(orders[idx]);
    if(openEmail) window.location.href=openEmail;
  }

  var btnAccept=document.getElementById('btnAccept');
  if(btnAccept){
    btnAccept.addEventListener('click',function(){
      var s=order.shipment; var c=order.client;
      var body=
        'Dear '+c.name+',\n\n'+
        'Great news! We have confirmed your HexaLog booking.\n\n'+
        'ORDER DETAILS\n'+
        '─────────────────────────────\n'+
        'Order ID     : '+order.id+'\n'+
        'Route        : '+(CNAME[s.from]||s.from)+' → '+(CNAME[s.to]||s.to)+'\n'+
        'Pallets      : '+s.qty+'× '+s.palletType+'\n'+
        'Service      : '+s.service+(s.express?' + Express 24h':'')+(s.weekend?' + Weekend':'')+'\n'+
        'Total Price  : '+order.price+'\n'+
        '─────────────────────────────\n\n'+
        'Our driver will contact you before pickup to confirm the exact time slot.\n\n'+
        'You can track your shipment at any time via the HexaLog Client Portal:\n'+
        '→ Open portal.html and enter your Order ID: '+order.id+'\n'+
        '→ Email: '+c.email+'\n\n'+
        'If you have any questions, reply to this email or call us.\n\n'+
        'Kind regards,\nHexaLog Team\ninfo@hexalog.eu';
      var mailto='mailto:'+c.email+
        '?subject=✓ Order '+order.id+' Confirmed — HexaLog'+
        '&body='+encodeURIComponent(body);
      updateOrderStatus('confirmed','Order accepted by operator', mailto);
    });
  }

  var btnReject=document.getElementById('btnReject');
  if(btnReject){
    btnReject.addEventListener('click',function(){
      if(!confirm('Are you sure you want to reject order '+order.id+'?')) return;
      var c=order.client;
      var body=
        'Dear '+c.name+',\n\n'+
        'Unfortunately we are unable to accept your booking at this time (Order ID: '+order.id+').\n\n'+
        'Possible reasons:\n'+
        '- The requested route or time slot is not available\n'+
        '- Capacity constraints on that date\n\n'+
        'Please contact us to discuss alternatives:\n'+
        'Email: info@hexalog.eu  |  Tel: +32 (0) 00 00 00 00\n\n'+
        'We apologise for any inconvenience.\n\n'+
        'Kind regards,\nHexaLog Team';
      var mailto='mailto:'+c.email+
        '?subject=Order '+order.id+' — HexaLog Update'+
        '&body='+encodeURIComponent(body);
      updateOrderStatus('cancelled','Order rejected by operator', mailto);
    });
  }

  var btnAsk=document.getElementById('btnAskInfo');
  if(btnAsk){
    btnAsk.addEventListener('click',function(){
      var c=order.client;
      var body=
        'Dear '+c.name+',\n\n'+
        'Thank you for your booking (Order ID: '+order.id+').\n\n'+
        'Before we can confirm your shipment, we need some additional information:\n\n'+
        '- \n\n'+
        'Please reply to this email at your earliest convenience.\n\n'+
        'Kind regards,\nHexaLog Team\ninfo@hexalog.eu';
      var mailto='mailto:'+c.email+
        '?subject=Order '+order.id+' — Additional Information Required'+
        '&body='+encodeURIComponent(body);
      updateOrderStatus('waiting_customer','Waiting for additional information from client', mailto);
    });
  }

  // POD upload
  var podFile=document.getElementById('podFile');
  if(podFile){
    podFile.addEventListener('change',function(){
      var file=podFile.files[0];
      if(!file) return;
      var reader=new FileReader();
      reader.onload=function(e){
        var orders=getOrders();
        var idx=orders.findIndex(function(o){return o.id===order.id});
        if(idx<0) return;
        orders[idx].pod=e.target.result;
        saveOrders(orders);
        renderDetail(orders[idx]);
      };
      reader.readAsDataURL(file);
    });
  }

  // Scroll into view
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function subscribeRealtime(){
  _sb.channel('orders-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'orders'}, async function(payload){
      await fetchOrders();
      var pending=_orders.filter(function(o){return o.status==='pending';});
      if(payload.eventType==='INSERT'){
        document.title='(1 New) HexaLog Admin TMS';
        if('Notification' in window && Notification.permission==='granted'){
          new Notification('HexaLog — New Order!',{body:'New booking received.',icon:''});

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://assets.codepen.io/16327/MorphSVGPlugin3.min.js"></script>
<script>
gsap.registerPlugin(MorphSVGPlugin);
var _emailEl=document.getElementById('loginEmail'),
    _passEl=document.getElementById('loginPassword'),
    _showChk=document.getElementById('showPasswordCheck'),
    _showTog=document.getElementById('showPasswordToggle'),
    _svgC=document.querySelector('.svgContainer'),
    _twoF=document.querySelector('.twoFingers'),
    _armL=document.querySelector('.armL'),_armR=document.querySelector('.armR'),
    _eyeL=document.querySelector('.eyeL'),_eyeR=document.querySelector('.eyeR'),
    _nose=document.querySelector('.nose'),_mouth=document.querySelector('.mouth'),
    _mBG=document.querySelector('.mouthBG'),_mSmBG=document.querySelector('.mouthSmallBG'),
    _mMeBG=document.querySelector('.mouthMediumBG'),_mLaBG=document.querySelector('.mouthLargeBG'),
    _mMkP=document.querySelector('#mouthMaskPath'),_mOut=document.querySelector('.mouthOutline'),
    _tooth=document.querySelector('.tooth'),_tongue=document.querySelector('.tongue'),
    _chin=document.querySelector('.chin'),_face=document.querySelector('.face'),
    _ebrow=document.querySelector('.eyebrow'),
    _oEarL=document.querySelector('.earL .outerEar'),_oEarR=document.querySelector('.earR .outerEar'),
    _eHairL=document.querySelector('.earL .earHair'),_eHairR=document.querySelector('.earR .earHair'),
    _hair=document.querySelector('.hair'),
    _bodyBG=document.querySelector('.bodyBGnormal'),_bodyBGc=document.querySelector('.bodyBGchanged');

var _active,_emailIdx,_scCenter,_svgPos,_emailPos,_emailScrMax,
    _chinMin=.5,_dFromC,_mouthSt='small',_blinking,_eyeScale=1,_eyesCov=false,_showClicked=false;
var _eLCoords,_eRCoords,_nCoords,_mCoords;

function _getPos(el){var x=0,y=0;while(el){if(el.tagName=='BODY'){x+=(el.offsetLeft-(el.scrollLeft||document.documentElement.scrollLeft)+el.clientLeft);y+=(el.offsetTop-(el.scrollTop||document.documentElement.scrollTop)+el.clientTop);}else{x+=(el.offsetLeft-el.scrollLeft+el.clientLeft);y+=(el.offsetTop-el.scrollTop+el.clientTop);}el=el.offsetParent;}return{x:x,y:y};}
function _getAngle(x1,y1,x2,y2){return Math.atan2(y1-y2,x1-x2);}
function _randInt(max){return Math.floor(Math.random()*Math.floor(max));}

function _calcFace(){
    var cPos=_emailEl.selectionEnd||_emailEl.value.length,div=document.createElement('div'),span=document.createElement('span'),cs=getComputedStyle(_emailEl);
    [].forEach.call(cs,function(p){div.style[p]=cs[p];});
    div.style.position='absolute';document.body.appendChild(div);
    div.textContent=_emailEl.value.substr(0,cPos);span.textContent=_emailEl.value.substr(cPos)||'.';div.appendChild(span);
    var caret,eLa,eRa,nA,mA,eLx,eLy,eRx,eRy,nX,nY,mX,mY,mR,cX,cY,cS,fX,fY,fSk,eSk,oeX,oeY,hX;
    if(_emailEl.scrollWidth<=_emailScrMax){caret=_getPos(span);_dFromC=_scCenter-(caret.x+_emailPos.x);eLa=_getAngle(_eLCoords.x,_eLCoords.y,_emailPos.x+caret.x,_emailPos.y+25);eRa=_getAngle(_eRCoords.x,_eRCoords.y,_emailPos.x+caret.x,_emailPos.y+25);nA=_getAngle(_nCoords.x,_nCoords.y,_emailPos.x+caret.x,_emailPos.y+25);mA=_getAngle(_mCoords.x,_mCoords.y,_emailPos.x+caret.x,_emailPos.y+25);}
    else{eLa=_getAngle(_eLCoords.x,_eLCoords.y,_emailPos.x+_emailScrMax,_emailPos.y+25);eRa=_getAngle(_eRCoords.x,_eRCoords.y,_emailPos.x+_emailScrMax,_emailPos.y+25);nA=_getAngle(_nCoords.x,_nCoords.y,_emailPos.x+_emailScrMax,_emailPos.y+25);mA=_getAngle(_mCoords.x,_mCoords.y,_emailPos.x+_emailScrMax,_emailPos.y+25);}
    eLx=Math.cos(eLa)*20;eLy=Math.sin(eLa)*10;eRx=Math.cos(eRa)*20;eRy=Math.sin(eRa)*10;
    nX=Math.cos(nA)*23;nY=Math.sin(nA)*10;mX=Math.cos(mA)*23;mY=Math.sin(mA)*10;mR=Math.cos(mA)*6;
    cX=mX*.8;cY=mY*.5;cS=1-((_dFromC*.15)/100);if(cS>1){cS=1-(cS-1);if(cS<_chinMin)cS=_chinMin;}
    fX=mX*.3;fY=mY*.4;fSk=Math.cos(mA)*5;eSk=Math.cos(mA)*25;oeX=Math.cos(mA)*4;oeY=Math.cos(mA)*5;hX=Math.cos(mA)*6;
    gsap.to(_eyeL,1,{x:-eLx,y:-eLy,ease:'expo.out'});gsap.to(_eyeR,1,{x:-eRx,y:-eRy,ease:'expo.out'});
    gsap.to(_nose,1,{x:-nX,y:-nY,rotation:mR,transformOrigin:'center center',ease:'expo.out'});
    gsap.to(_mouth,1,{x:-mX,y:-mY,rotation:mR,transformOrigin:'center center',ease:'expo.out'});
    gsap.to(_chin,1,{x:-cX,y:-cY,scaleY:cS,ease:'expo.out'});
    gsap.to(_face,1,{x:-fX,y:-fY,skewX:-fSk,transformOrigin:'center top',ease:'expo.out'});
    gsap.to(_ebrow,1,{x:-fX,y:-fY,skewX:-eSk,transformOrigin:'center top',ease:'expo.out'});
    gsap.to(_oEarL,1,{x:oeX,y:-oeY,ease:'expo.out'});gsap.to(_oEarR,1,{x:oeX,y:oeY,ease:'expo.out'});
    gsap.to(_eHairL,1,{x:-oeX,y:-oeY,ease:'expo.out'});gsap.to(_eHairR,1,{x:-oeX,y:oeY,ease:'expo.out'});
    gsap.to(_hair,1,{x:hX,scaleY:1.2,transformOrigin:'center bottom',ease:'expo.out'});
    document.body.removeChild(div);
}
function _onEmailInput(){
    _calcFace();
    var v=_emailEl.value;
    if(v.length>0){
        if(v.includes('@')){_mouthSt='large';gsap.to([_mBG,_mOut,_mMkP],1,{morphSVG:_mLaBG,ease:'expo.out'});gsap.to(_tooth,1,{x:3,y:-2,ease:'expo.out'});gsap.to(_tongue,1,{y:2,ease:'expo.out'});gsap.to([_eyeL,_eyeR],1,{scaleX:.65,scaleY:.65,ease:'expo.out',transformOrigin:'center center'});_eyeScale=.65;}
        else{_mouthSt='medium';gsap.to([_mBG,_mOut,_mMkP],1,{morphSVG:_mMeBG,shapeIndex:8,ease:'expo.out'});gsap.to(_tooth,1,{x:0,y:0,ease:'expo.out'});gsap.to(_tongue,1,{x:0,y:1,ease:'expo.out'});gsap.to([_eyeL,_eyeR],1,{scaleX:.85,scaleY:.85,ease:'expo.out'});_eyeScale=.85;}
    }else{_mouthSt='small';gsap.to([_mBG,_mOut,_mMkP],1,{morphSVG:_mSmBG,shapeIndex:9,ease:'expo.out'});gsap.to(_tooth,1,{x:0,y:0,ease:'expo.out'});gsap.to(_tongue,1,{y:0,ease:'expo.out'});gsap.to([_eyeL,_eyeR],1,{scaleX:1,scaleY:1,ease:'expo.out'});_eyeScale=1;}
}
function _resetFace(){gsap.to([_eyeL,_eyeR],1,{x:0,y:0,ease:'expo.out'});gsap.to(_nose,1,{x:0,y:0,scaleX:1,scaleY:1,ease:'expo.out'});gsap.to(_mouth,1,{x:0,y:0,rotation:0,ease:'expo.out'});gsap.to(_chin,1,{x:0,y:0,scaleY:1,ease:'expo.out'});gsap.to([_face,_ebrow],1,{x:0,y:0,skewX:0,ease:'expo.out'});gsap.to([_oEarL,_oEarR,_eHairL,_eHairR,_hair],1,{x:0,y:0,scaleY:1,ease:'expo.out'});}
function _coverEyes(){gsap.killTweensOf([_armL,_armR]);gsap.set([_armL,_armR],{visibility:'visible'});gsap.to(_armL,.45,{x:-93,y:10,rotation:0,ease:'quad.out'});gsap.to(_armR,.45,{x:-93,y:10,rotation:0,ease:'quad.out',delay:.1});gsap.to(_bodyBG,.45,{morphSVG:_bodyBGc,ease:'quad.out'});_eyesCov=true;}
function _uncoverEyes(){gsap.killTweensOf([_armL,_armR]);gsap.to(_armL,1.35,{y:220,ease:'quad.out'});gsap.to(_armL,1.35,{rotation:105,ease:'quad.out',delay:.1});gsap.to(_armR,1.35,{y:220,ease:'quad.out'});gsap.to(_armR,1.35,{rotation:-105,ease:'quad.out',delay:.1,onComplete:function(){gsap.set([_armL,_armR],{visibility:'hidden'});}});gsap.to(_bodyBG,.45,{morphSVG:_bodyBG,ease:'quad.out'});_eyesCov=false;}
function _startBlink(d){_blinking=gsap.to([_eyeL,_eyeR],.1,{delay:d||1,scaleY:0,yoyo:true,repeat:1,transformOrigin:'center center',onComplete:function(){_startBlink(_randInt(12));}});}

// init
_svgPos=_getPos(_svgC);_emailPos=_getPos(_emailEl);
_scCenter=_svgPos.x+(_svgC.offsetWidth/2);
_eLCoords={x:_svgPos.x+84,y:_svgPos.y+76};_eRCoords={x:_svgPos.x+113,y:_svgPos.y+76};
_nCoords={x:_svgPos.x+97,y:_svgPos.y+81};_mCoords={x:_svgPos.x+100,y:_svgPos.y+100};
gsap.set(_armL,{x:-93,y:220,rotation:105,transformOrigin:'top left'});
gsap.set(_armR,{x:-93,y:220,rotation:-105,transformOrigin:'top right'});
gsap.set(_mouth,{transformOrigin:'center center'});
_startBlink(5);_emailScrMax=_emailEl.scrollWidth;

_emailEl.addEventListener('focus',function(e){_active='email';document.getElementById('yetiIG1').classList.add('focusWithText');_onEmailInput();});
_emailEl.addEventListener('blur',function(e){_active=null;setTimeout(function(){if(_active=='email')return;if(e.target.value=='')document.getElementById('yetiIG1').classList.remove('focusWithText');_resetFace();},100);});
_emailEl.addEventListener('input',_onEmailInput);
_passEl.addEventListener('focus',function(){_active='password';if(!_eyesCov)_coverEyes();});
_passEl.addEventListener('blur',function(){_active=null;setTimeout(function(){if(_active=='toggle'||_active=='password')return;_uncoverEyes();},100);});
_showTog.addEventListener('mousedown',function(){_showClicked=true;});
_showTog.addEventListener('mouseup',function(){_showClicked=false;});
_showChk.addEventListener('focus',function(){_active='toggle';if(!_eyesCov)_coverEyes();});
_showChk.addEventListener('blur',function(){_active=null;if(!_showClicked){setTimeout(function(){if(_active=='password'||_active=='toggle')return;_uncoverEyes();},100);}});
_showChk.addEventListener('change',function(e){setTimeout(function(){if(e.target.checked){_passEl.type='text';gsap.to(_twoF,.35,{transformOrigin:'bottom left',rotation:30,x:-9,y:-2,ease:'power2.inOut'});}else{_passEl.type='password';gsap.to(_twoF,.35,{transformOrigin:'bottom left',rotation:0,x:0,y:0,ease:'power2.inOut'});}},100);});
</script>
